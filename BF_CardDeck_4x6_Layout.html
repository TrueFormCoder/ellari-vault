<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Fairy — 4×6 Card Deck Layout</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
:root{
  --void:#050407;--panel:#0e0b16;--border:#252040;
  --silver:#c9c4cf;--mist:#484060;--white:#ede8f8;
  --bleed-bg:#030205;
  --cut-line:rgba(201,196,207,.12);
  --safe-line:rgba(144,96,200,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#161224;color:var(--white);font-family:'Cormorant Garamond',serif;}

/* ── HEADER ────────────────────────────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(5,4,7,.96);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(36,32,64,.8);
  padding:0 24px;height:52px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.hdr-left{display:flex;flex-direction:column;gap:1px;}
.hdr-brand{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.3em;color:#484060;text-transform:uppercase;}
.hdr-title{font-size:13px;font-weight:300;letter-spacing:.08em;color:var(--silver);}
.hdr-right{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}

/* buttons */
.btn{
  font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;
  padding:5px 10px;border-radius:2px;cursor:pointer;background:transparent;transition:all .15s;
}
.btn-lane{border:1px solid rgba(36,32,64,.8);color:var(--mist);}
.btn-lane.on{border-color:rgba(201,196,207,.35);color:var(--silver);background:rgba(201,196,207,.04);}
.btn-lane:hover:not(.on){border-color:var(--mist);color:#9090a8;}
.btn-action{border:1px solid rgba(80,60,128,.4);color:#9878d0;}
.btn-action.on{background:rgba(80,60,128,.18);color:#c0a0f8;}
.btn-action:hover{background:rgba(80,60,128,.1);}
.sep{width:1px;height:18px;background:rgba(36,32,64,.8);margin:0 2px;}

/* ── GRID ──────────────────────────────────────────────────────── */
.grid{display:flex;flex-wrap:wrap;gap:24px;padding:28px;justify-content:center;}
.grid.compact{gap:14px;padding:20px;}
.grid.oneup{flex-direction:column;align-items:center;gap:32px;padding:32px;}

/* ── CARD WRAP ─────────────────────────────────────────────────── */
.cw{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;}
.cw-label{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.2em;color:var(--mist);text-transform:uppercase;}

/* ═══════════════════════════════════════════════════════════════
   CELL-IN-CELL PRINT LAYOUT
   ┌── BLEED (outer) ──────────────────────────────────────────┐
   │   12px bleed on all sides — background bleeds past cut    │
   │  ┌── CARD FACE (cut line) ──────────────────────────────┐ │
   │  │   actual 4×6 card dimensions                         │ │
   │  │  ┌── SAFE ZONE ──────────────────────────────────── ┐ │ │
   │  │  │  14px inset — all content lives here             │ │ │
   │  │  └──────────────────────────────────────────────────┘ │ │
   │  └──────────────────────────────────────────────────────┘ │
   └───────────────────────────────────────────────────────────┘
═══════════════════════════════════════════════════════════════ */

/* BLEED CONTAINER — background continues past cut line */
.card-bleed{
  width:304px;            /* card face 280 + 12px bleed each side */
  height:444px;           /* card face 420 + 12px bleed each side */
  position:relative;
  background:var(--bleed-bg);
  border-radius:4px;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 4px 32px rgba(0,0,0,.7);
}
.cw:hover .card-bleed{transform:scale(1.015);box-shadow:0 8px 48px rgba(0,0,0,.85);}
.cw.selected .card-bleed{box-shadow:0 0 0 2px rgba(144,96,200,.55),0 8px 48px rgba(0,0,0,.85);}

/* Bleed art — background that extends past cut */
.bleed-art{
  position:absolute;inset:0;border-radius:4px;z-index:0;
  background:
    radial-gradient(ellipse 90% 70% at 50% 25%,rgba(104,40,192,.28) 0%,rgba(72,24,148,.12) 45%,transparent 72%),
    radial-gradient(ellipse 55% 40% at 50% 65%,rgba(56,20,112,.1) 0%,transparent 60%),
    linear-gradient(180deg,#060410 0%,#030208 100%);
}
.bleed-art::after{
  content:'';position:absolute;inset:0;border-radius:4px;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:110px;
}

/* CARD FACE — the actual cut card (280×420) */
.card-face{
  position:absolute;
  top:12px;left:12px;
  width:280px;height:420px;
  border-radius:6px;
  overflow:hidden;
  z-index:1;
  /* cut line indicator — very faint, proof only */
  box-shadow:0 0 0 1px var(--cut-line);
}

/* Safe-zone guide (toggled via .show-guides class on body) */
.card-face::after{
  content:'';
  position:absolute;
  top:14px;left:14px;right:14px;bottom:14px;
  border:1px dashed var(--safe-line);
  border-radius:2px;
  z-index:8;
  pointer-events:none;
  opacity:0;transition:opacity .2s;
}
body.show-guides .card-face::after{opacity:1;}

/* CROP MARKS — appear outside bleed on body.show-marks */
.crop-marks{
  position:absolute;inset:-10px;z-index:9;pointer-events:none;display:none;
}
body.show-marks .crop-marks{display:block;}
.cm{position:absolute;background:rgba(201,196,207,.45);}
/* Top-left */
.cm-tl-h{top:10px;left:0;width:8px;height:0.5px;}
.cm-tl-v{top:0;left:10px;width:0.5px;height:8px;}
/* Top-right */
.cm-tr-h{top:10px;right:0;width:8px;height:0.5px;}
.cm-tr-v{top:0;right:10px;width:0.5px;height:8px;}
/* Bottom-left */
.cm-bl-h{bottom:10px;left:0;width:8px;height:0.5px;}
.cm-bl-v{bottom:0;left:10px;width:0.5px;height:8px;}
/* Bottom-right */
.cm-br-h{bottom:10px;right:0;width:8px;height:0.5px;}
.cm-br-v{bottom:0;right:10px;width:0.5px;height:8px;}

/* ── CARD FACE INTERNALS ────────────────────────────────────── */
/* Card number */
.card-num{
  position:absolute;top:18px;left:20px;z-index:5;
  font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.2em;
  color:rgba(201,196,207,.36);text-transform:uppercase;
}
/* Lane badge */
.card-lane{
  position:absolute;top:16px;right:18px;z-index:5;
  font-family:'Space Mono',monospace;font-size:6.5px;letter-spacing:.14em;
  padding:2px 7px;border-radius:2px;text-transform:uppercase;
}
.lane-public     {color:#60c898;border:1px solid rgba(96,200,152,.25);}
.lane-facilitator{color:rgba(192,160,248,.8);border:1px solid rgba(152,96,216,.2);}
.lane-operator   {color:rgba(201,196,207,.6);border:1px solid rgba(201,196,207,.15);}
.lane-qa         {color:rgba(74,68,96,.75);border:1px solid rgba(74,68,96,.3);}

/* SIGIL — flex-centered in dome area */
.card-sigil-area{
  position:absolute;
  top:0;left:0;right:0;height:46%;
  z-index:4;
  display:flex;align-items:center;justify-content:center;
  padding-top:30px;
  pointer-events:none;
}
.card-sigil{
  width:88px;height:88px;
  opacity:.74;transition:opacity .2s;
  flex-shrink:0;
}
.card-sigil svg{width:100%;height:100%;overflow:visible;display:block;}
.cw:hover .card-sigil,.cw.selected .card-sigil{opacity:1;}

/* Lower gradient */
.card-lower{
  position:absolute;bottom:0;left:0;right:0;height:60%;z-index:2;
  background:linear-gradient(0deg,
    rgba(4,3,7,.99) 0%,
    rgba(4,3,7,.97) 30%,
    rgba(4,3,7,.88) 52%,
    rgba(4,3,7,.55) 70%,
    rgba(4,3,7,.18) 85%,
    transparent 100%
  );
}

/* CONTENT — inside safe zone (14px from card face edges) */
.card-content{
  position:absolute;
  bottom:14px;left:14px;right:14px;
  z-index:5;
}
.card-title{
  font-size:15px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;
  color:var(--silver);text-align:center;margin-bottom:5px;line-height:1.1;
}
.card-div{width:26px;height:1px;background:rgba(201,196,207,.18);margin:0 auto 5px;}
.card-chips{display:flex;gap:5px;justify-content:center;margin-bottom:6px;align-items:center;}
.chip-key{
  font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.2em;
  color:rgba(160,112,220,.78);padding:2px 5px;
  border:1px solid rgba(144,96,200,.22);border-radius:2px;
}
.chip-int{font-family:'Space Mono',monospace;font-size:7px;color:rgba(201,196,207,.28);letter-spacing:.05em;}
.card-fields{display:flex;flex-direction:column;gap:4px;}
.cf-row{display:flex;flex-direction:column;gap:1px;}
.cf-label{
  font-family:'Space Mono',monospace;font-size:5.5px;letter-spacing:.28em;
  text-transform:uppercase;color:rgba(160,112,220,.82);
}
.cf-text{font-size:9px;color:rgba(201,196,207,.84);line-height:1.4;}
.card-footer{
  position:absolute;bottom:7px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Space Mono',monospace;font-size:5.5px;letter-spacing:.18em;
  color:rgba(80,72,104,.48);text-transform:uppercase;white-space:nowrap;
}

/* ── CARD BACK ─────────────────────────────────────────────── */
.card-back{
  position:absolute;inset:0;background:var(--void);z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.card-back.show{opacity:1;pointer-events:all;}
.cb-phrase{font-family:'IM Fell English',serif;font-style:italic;font-size:13px;color:rgba(201,196,207,.5);}
.cb-rule{width:22px;height:1px;background:rgba(201,196,207,.16);}
.cb-mark{font-family:'Space Mono',monospace;font-size:6px;letter-spacing:.22em;color:rgba(74,68,96,.58);text-transform:uppercase;}

/* ── DETAIL PANEL ──────────────────────────────────────────── */
.detail{display:none;max-width:640px;margin:0 auto 40px;padding:0 24px;}
.detail.show{display:block;}
.dp-card{background:var(--panel);border:1px solid rgba(36,32,64,.8);border-radius:5px;padding:22px;}
.dp-num{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.3em;color:var(--mist);text-transform:uppercase;margin-bottom:5px;}
.dp-name{font-size:22px;font-weight:300;letter-spacing:.1em;margin-bottom:5px;}
.dp-incant{font-family:'IM Fell English',serif;font-style:italic;font-size:16px;color:rgba(192,160,248,.9);margin-bottom:14px;line-height:1.5;}
.dp-field{margin-bottom:8px;}
.dp-fl{font-family:'Space Mono',monospace;font-size:7.5px;letter-spacing:.2em;color:rgba(144,96,200,.8);text-transform:uppercase;display:block;margin-bottom:2px;}
.dp-fv{font-size:13.5px;color:rgba(201,196,207,.85);line-height:1.6;}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.dp-chip{background:rgba(0,0,0,.25);border:1px solid rgba(36,32,64,.5);border-radius:3px;padding:9px 12px;}
.dpc-lbl{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.15em;color:var(--mist);text-transform:uppercase;display:block;margin-bottom:3px;}
.dpc-val{font-size:12px;color:rgba(201,196,207,.7);}

/* 1-UP mode — single column, larger cards */
.grid.oneup .card-bleed{width:380px;height:556px;}
.grid.oneup .card-face{top:15px;left:15px;width:350px;height:526px;}
.grid.oneup .card-sigil{width:110px;height:110px;}
.grid.oneup .card-title{font-size:19px;}
.grid.oneup .cf-text{font-size:11.5px;}
.grid.oneup .cf-label{font-size:7px;}

@media(max-width:600px){
  .hdr{padding:0 14px;}
  .grid{padding:14px;gap:14px;}
}
@media print{
  body{background:#000;}
  .hdr,.detail{display:none;}
  .grid{padding:6px;gap:8px;}
  .cw:hover .card-bleed{transform:none;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-brand">Black Fairy &middot; 4&times;6 Card Deck</div>
    <div class="hdr-title">13 Cards &middot; Cell-in-Cell Print Layout</div>
  </div>
  <div class="hdr-right">
    <span style="font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.2em;color:var(--mist);text-transform:uppercase;">Lane</span>
    <button class="btn btn-lane on"  onclick="setLane('all',this)">All</button>
    <button class="btn btn-lane" onclick="setLane('Public',this)">Public</button>
    <button class="btn btn-lane" onclick="setLane('Facilitator',this)">Facilitator</button>
    <button class="btn btn-lane" onclick="setLane('Operator',this)">Operator</button>
    <div class="sep"></div>
    <button class="btn btn-action" id="backBtn"   onclick="toggleBacks()">Backs</button>
    <button class="btn btn-action" id="guidesBtn" onclick="toggleGuides()">Guides</button>
    <button class="btn btn-action" id="marksBtn"  onclick="toggleMarks()">Marks</button>
    <button class="btn btn-action" id="oneupBtn"  onclick="toggleOneUp()">1-up</button>
  </div>
</div>

<div class="grid" id="cardGrid"></div>
<div class="detail" id="detail"></div>

   mirror:'What threshold have you already crossed?',
   move:'Face the open space. Take one step into it.',
   incant:'Na tan-te en fa sel.'},
  {id:'C-11',r:'R.17',name:'The Line Remains',   sig:'line-remains',       lane:'Facilitator', key:'TH',dots:3,
   signal:'What false shape has collapsed?',
   mirror:'Name what was never true.',
   move:'Name the line. Let it stand.',
   incant:'The false shapes fall. The line remains.'},
  {id:'C-12',r:'R.12',name:'Return to Violet',   sig:'return-violet',      lane:'Internal QA', key:'BE',dots:1,
   signal:'What did you already know before the noise?',
   mirror:'Name the original knowing.',
   move:'Return to it. One quiet decision.',
   incant:'En del-te rola. Ellari.'},
  {id:'C-13',r:'\u2014',name:'Done for Now',     sig:'done-for-now',       lane:'Public',      key:'MS',dots:1,
   signal:'Is this complete enough to set down?',
   mirror:'Name what completion looks like for today.',
   move:'Set it down. Rest.',
   incant:'Zakhor.'},
];

var LANE_CSS = {
  'Public':'lane-public','Facilitator':'lane-facilitator',
  'Operator':'lane-operator','Internal QA':'lane-qa'
};

var showBacks=false, showGuides=false, showMarks=false, oneUp=false;
var selIdx=null, curLane='all';

function dots(n) {
  var s='';
  for(var i=0;i<3;i++) s+=(i<n)?'\u25CF':'\u25CB';
  return s;
}

function cardHTML(c,i) {
  var lc   = LANE_CSS[c.lane]||'lane-qa';
  var sel  = (selIdx===i)?' selected':'';
  var hide = (curLane!=='all'&&c.lane!==curLane)?'display:none':'';
  var back = showBacks?' show':'';

  return '<div class="cw'+sel+'" id="cw'+i+'" onclick="pick('+i+')" style="'+hide+'">'
    +'<div class="card-bleed">'
      +'<div class="bleed-art"></div>'
      +'<div class="crop-marks">'
        +'<div class="cm cm-tl-h"></div><div class="cm cm-tl-v"></div>'
        +'<div class="cm cm-tr-h"></div><div class="cm cm-tr-v"></div>'
        +'<div class="cm cm-bl-h"></div><div class="cm cm-bl-v"></div>'
        +'<div class="cm cm-br-h"></div><div class="cm cm-br-v"></div>'
      +'</div>'
      +'<div class="card-face">'
        +'<div class="card-num">'+c.id+' &middot; '+c.r+'</div>'
        +'<div class="card-lane '+lc+'">'+c.lane+'</div>'
        +'<div class="card-sigil-area"><div class="card-sigil">'+mkSigil(c.sig)+'</div></div>'
        +'<div class="card-lower"></div>'
        +'<div class="card-content">'
          +'<div class="card-title">'+c.name+'</div>'
          +'<div class="card-div"></div>'
          +'<div class="card-chips">'
            +'<span class="chip-key">'+c.key+'</span>'
            +'<span class="chip-int">'+dots(c.dots)+'</span>'
          +'</div>'
          +'<div class="card-fields">'
            +'<div class="cf-row"><span class="cf-label">Signal</span><div class="cf-text">'+c.signal+'</div></div>'
            +'<div class="cf-row"><span class="cf-label">Mirror</span><div class="cf-text">'+c.mirror+'</div></div>'
            +'<div class="cf-row"><span class="cf-label">Move</span><div class="cf-text">'+c.move+'</div></div>'
          +'</div>'
        +'</div>'
        +'<div class="card-footer">MIRROR&trade; &middot; ELARRI.AI</div>'
        +'<div class="card-back'+back+'">'
          +'<div style="opacity:.55">'+mkSigil('mirror-circuit','rgba(201,196,207,0.4)')+'</div>'
          +'<div class="cb-rule"></div>'
          +'<div class="cb-phrase">El ter sel is.</div>'
          +'<div class="cb-mark">MIRROR&trade; &middot; ELARRI.AI</div>'
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div class="cw-label">'+c.id+' &middot; V1.0</div>'
  +'</div>';
}

function render() {
  var h='';
  for(var i=0;i<CARDS.length;i++) h+=cardHTML(CARDS[i],i);
  document.getElementById('cardGrid').innerHTML=h;
}

function pick(i) {
  selIdx=(selIdx===i)?null:i;
  render();
  var panel=document.getElementById('detail');
  if(selIdx===null){panel.classList.remove('show');return;}
  var c=CARDS[i];
  panel.innerHTML='<div class="dp-card">'
    +'<div class="dp-num">'+c.id+' &middot; '+c.r+' &middot; '+c.lane+' &middot; Key: '+c.key+' &middot; '+dots(c.dots)+'</div>'
    +'<div class="dp-name">'+c.name+'</div>'
    +'<div class="dp-incant">&ldquo;'+c.incant+'&rdquo;</div>'
    +'<div class="dp-field"><span class="dp-fl">Signal</span><div class="dp-fv">'+c.signal+'</div></div>'
    +'<div class="dp-field"><span class="dp-fl">Mirror</span><div class="dp-fv">'+c.mirror+'</div></div>'
    +'<div class="dp-field"><span class="dp-fl">Move</span><div class="dp-fv">'+c.move+'</div></div>'
    +'<div class="dp-grid">'
      +'<div class="dp-chip"><span class="dpc-lbl">Pass standard</span><div class="dpc-val">C/S/A/P/DS &ge; 4 &middot; Load &le; 3</div></div>'
      +'<div class="dp-chip"><span class="dpc-lbl">Intensity</span><div class="dpc-val">'+dots(c.dots)+' &middot; '+(c.dots===3?'Black Label':c.dots===2?'Member':'Open')+'</div></div>'
    +'</div>'
  +'</div>';
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function setLane(lane,btn) {
  curLane=lane;
  document.querySelectorAll('.btn-lane').forEach(function(b){
    b.classList.toggle('on',b===btn);
  });
  render();
}

function toggleBacks() {
  showBacks=!showBacks;
  document.getElementById('backBtn').classList.toggle('on',showBacks);
  render();
}
function toggleGuides() {
  showGuides=!showGuides;
  document.getElementById('guidesBtn').classList.toggle('on',showGuides);
  document.body.classList.toggle('show-guides',showGuides);
}
function toggleMarks() {
  showMarks=!showMarks;
  document.getElementById('marksBtn').classList.toggle('on',showMarks);
  document.body.classList.toggle('show-marks',showMarks);
}
function toggleOneUp() {
  oneUp=!oneUp;
  document.getElementById('oneupBtn').classList.toggle('on',oneUp);
  var grid=document.getElementById('cardGrid');
  grid.className=oneUp?'grid oneup':'grid';
  render();
}

render();
</script>
</body>
</html>
